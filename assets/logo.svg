<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="phantom — supply-chain forensics in the AI era">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a14"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <linearGradient id="phantomFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aaeff"/>
      <stop offset="0.55" stop-color="#5b75ff"/>
      <stop offset="1" stop-color="#2a3ad0"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3aa" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#22d3aa" stop-opacity="0.85"/>
      <stop offset="0.85" stop-color="#ff5b5b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff5b5b" stop-opacity="0"/>
    </linearGradient>
    <filter id="phantomGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- background grid (subtle) -->
  <g opacity="0.06" stroke="#9aaeff" stroke-width="1">
    <path d="M0 50 H1200 M0 100 H1200 M0 150 H1200 M0 200 H1200 M0 250 H1200 M0 300 H1200 M0 350 H1200"/>
    <path d="M50 0 V400 M150 0 V400 M250 0 V400 M350 0 V400 M450 0 V400 M550 0 V400 M650 0 V400 M750 0 V400 M850 0 V400 M950 0 V400 M1050 0 V400 M1150 0 V400"/>
  </g>

  <!-- horizontal scan line -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="url(#scan)" stroke-width="2"/>

  <!-- phantom silhouette -->
  <g transform="translate(120,75)" filter="url(#phantomGlow)">
    <!-- body: semicircular cap + straight sides + wavy bottom (4 bumps) -->
    <path d="
      M 16 130
      C 16 -10, 224 -10, 224 130
      L 224 230
      L 210 210 L 196 230 L 182 210 L 168 230 L 154 210 L 140 230 L 126 210 L 112 230 L 98 210 L 84 230 L 70 210 L 56 230 L 42 210 L 28 230 L 16 210
      Z"
      fill="url(#phantomFill)"
      stroke="#dde6ff" stroke-width="1.5" stroke-opacity="0.45"/>
    <!-- code-eye sockets -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-size="78" font-weight="900" fill="#0a0e1a">
      <text x="49" y="135" text-anchor="middle">{</text>
      <text x="191" y="135" text-anchor="middle">}</text>
    </g>
    <!-- mouth: thin slit of "diff" markers -->
    <g font-family="ui-monospace, monospace" font-size="20" font-weight="700" fill="#0a0e1a" opacity="0.85">
      <text x="120" y="180" text-anchor="middle">+ - + - +</text>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Mono', monospace" font-weight="900" fill="#eef3ff">
    <text x="430" y="225" font-size="160" letter-spacing="-6">phantom</text>
  </g>

  <!-- tagline -->
  <g font-family="ui-monospace, monospace" fill="#22d3aa" opacity="0.9">
    <text x="438" y="275" font-size="22" letter-spacing="2">supply-chain forensics for the AI-assisted era</text>
  </g>

  <!-- finding indicator: pulsing red dot at far right -->
  <g transform="translate(1130,200)">
    <circle r="22" fill="none" stroke="#ff5b5b" stroke-width="1.5" opacity="0.35"/>
    <circle r="14" fill="none" stroke="#ff5b5b" stroke-width="1.5" opacity="0.7"/>
    <circle r="6" fill="#ff5b5b" filter="url(#softGlow)"/>
  </g>

  <!-- corner brackets, a la inspector frame -->
  <g stroke="#22d3aa" stroke-width="2" fill="none" opacity="0.65">
    <path d="M16 16 L16 56 M16 16 L56 16"/>
    <path d="M1184 16 L1184 56 M1184 16 L1144 16"/>
    <path d="M16 384 L16 344 M16 384 L56 384"/>
    <path d="M1184 384 L1184 344 M1184 384 L1144 384"/>
  </g>
</svg>
