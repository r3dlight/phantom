# CI for Phantom — runs unit tests and Phantom's *own* detectors on this repo.
#
# The self-audit is dogfooding: we use Phantom to enforce that no AI-agent
# configuration file (CLAUDE.md, .mcp.json, .claude/settings.json, ...) sneaks
# into the production codebase outside the test fixtures, and that no
# indirect prompt-injection pattern lands in the project's documentation.
#
# Whitelists used:
#   - `examples/` is excluded from every detector — it contains intentional
#     attack fixtures used by the test suite and the README's demos.
#   - `README.md` is excluded from `promptinjection` because the README
#     documents the patterns Phantom catches (it literally contains lines
#     like "Ignore previous instructions" as quoted examples). The day we
#     get a `<!-- phantom-disable -->` annotation system, this exclusion
#     can shrink to a few sections instead of the whole file.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: build, test, self-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to upload SARIF reports to the Code Scanning tab.
      # On forked PRs the upload step degrades gracefully — see
      # `continue-on-error: true` below.
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --release --workspace

      - name: cargo test
        run: cargo test --workspace

      # ────────────────────────────────────────────────────────────────────
      # Phantom self-audit
      # ────────────────────────────────────────────────────────────────────

      - name: phantom · aiconfig — ban AI-agent configs outside examples/
        run: |
          ./target/release/phantom \
            --fail-on never --format sarif \
            aiconfig . \
              --ignore examples \
              --ignore target \
            > phantom-aiconfig.sarif

      - name: upload aiconfig SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: phantom-aiconfig.sarif
          category: phantom-aiconfig

      - name: archive aiconfig SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phantom-aiconfig-sarif
          path: phantom-aiconfig.sarif
          retention-days: 7

      - name: phantom · promptinjection — scan project docs
        run: |
          ./target/release/phantom \
            --fail-on never --format sarif \
            promptinjection . \
              --ignore examples \
              --ignore target \
              --ignore README.md \
            > phantom-promptinjection.sarif

      - name: upload promptinjection SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: phantom-promptinjection.sarif
          category: phantom-promptinjection

      - name: archive promptinjection SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phantom-promptinjection-sarif
          path: phantom-promptinjection.sarif
          retention-days: 7

      # ────────────────────────────────────────────────────────────────────
      # Build gates — fail the workflow on real findings.
      # The SARIF uploads above run with `if: always()` so they finish before
      # we get here, ensuring annotations land on the PR even when we abort.
      # ────────────────────────────────────────────────────────────────────

      - name: gate — fail on any AI-agent config outside examples/
        run: |
          ./target/release/phantom \
            --fail-on info \
            aiconfig . \
              --ignore examples \
              --ignore target \
            > /dev/null

      - name: gate — fail on HIGH+ prompt-injection findings
        run: |
          ./target/release/phantom \
            --fail-on high \
            promptinjection . \
              --ignore examples \
              --ignore target \
              --ignore README.md \
            > /dev/null

      # Upload phantom binary as a workflow artifact for downstream jobs /
      # manual inspection. Retention kept short — release pipeline will
      # produce signed artifacts with longer retention.
      - name: upload phantom binary
        uses: actions/upload-artifact@v4
        with:
          name: phantom-linux-x86_64
          path: target/release/phantom
          retention-days: 7
