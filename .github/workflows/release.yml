# Release pipeline for Phantom.
#
# Triggers
#   - Push of a `v<major>.<minor>.<patch>[-suffix]` tag → cuts a real release.
#   - Manual `workflow_dispatch` → produces draft artifacts under a chosen tag,
#     useful for dry runs and pre-release testing.
#
# Targets (all built on native runners, no cross-compilation)
#   - Linux  x86_64    (ubuntu-latest)
#   - Linux  aarch64   (ubuntu-24.04-arm)
#   - macOS  x86_64    (macos-13)
#   - macOS  aarch64   (macos-14)            ← Apple Silicon
#   - Windows x86_64   (windows-latest)
#
# Each target produces:
#   phantom-<tag>-<target>.{tar.gz | zip}    + .sha256 alongside
#   The combined SHA256SUMS file is generated in the release job.
#
# Build provenance is attested via `actions/attest-build-provenance@v2`,
# producing a SLSA Level 3 verifiable claim that the binaries were built
# from this repo at this commit on a GitHub-hosted runner.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Required when triggered manually.'
        required: true

permissions:
  contents: read

jobs:
  resolve:
    name: resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - id: t
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/tags/${GITHUB_REF#refs/tags/}" ] && [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.tag }}"
          fi
          if [ -z "${tag}" ]; then
            echo "no tag resolved" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}"     >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${tag} (version: ${version})"

  build:
    name: build ${{ matrix.target }}
    needs: resolve
    permissions:
      contents: read
      id-token: write       # required by attest-build-provenance
      attestations: write   # required by attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            shell: bash
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            shell: bash
          # macOS Intel: cross-compiled from the Apple Silicon runner because
          # `macos-13` (Intel) runners frequently sit in queue for hours and
          # block the entire release. Rust handles `aarch64 → x86_64` Apple
          # cross-compilation cleanly on a single host.
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            shell: bash
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            shell: bash
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: cargo build
        run: cargo build --release --bin phantom --target ${{ matrix.target }}

      - name: smoke test (--version)
        if: matrix.shell == 'bash'
        shell: bash
        run: ./target/${{ matrix.target }}/release/phantom --version

      - name: smoke test (--version, windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: .\target\${{ matrix.target }}\release\phantom.exe --version

      - name: package (unix)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve.outputs.tag }}"
          stage="phantom-${tag}-${{ matrix.target }}"
          mkdir "${stage}"
          cp "target/${{ matrix.target }}/release/phantom" "${stage}/"
          cp README.md LICENSE "${stage}/"
          cp -r examples "${stage}/"
          tar -czf "${stage}.tar.gz" "${stage}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          else
            sha256sum  "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi
          cat "${stage}.tar.gz.sha256"

      - name: package (windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ needs.resolve.outputs.tag }}'
          $stage = "phantom-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/phantom.exe" "$stage/"
          Copy-Item README.md, LICENSE "$stage/"
          Copy-Item -Recurse examples "$stage/"
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          $hash = Get-FileHash "$stage.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $stage.zip" | Out-File -FilePath "$stage.zip.sha256" -Encoding ASCII
          Get-Content "$stage.zip.sha256"

      - name: SLSA build-provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.tar.gz
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.zip
          # subject-path globs that don't match are ignored, so this
          # works for both unix (.tar.gz) and windows (.zip) archives.

      - uses: actions/upload-artifact@v4
        with:
          name: phantom-${{ matrix.target }}
          path: |
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.tar.gz
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.tar.gz.sha256
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.zip
            phantom-${{ needs.resolve.outputs.tag }}-${{ matrix.target }}.zip.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: github release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create the release and upload assets
    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: combined SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          ls -la
          rm -f SHA256SUMS
          for f in phantom-*.tar.gz phantom-*.zip; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: create / update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          notes=$(cat <<EOF
          # phantom ${tag}

          Pre-built binaries for Linux (x86_64, aarch64), macOS (Intel + Apple Silicon), and Windows (x86_64).

          ### Verify a download

          \`\`\`sh
          # SHA256
          shasum -a 256 -c SHA256SUMS

          # SLSA build provenance (requires gh + the cosign attestation API)
          gh attestation verify --repo ${repo} phantom-${tag}-<target>.tar.gz
          \`\`\`

          See [README](https://github.com/${repo}/blob/main/README.md) for usage.
          EOF
          )

          # Idempotent: edit if the release already exists, else create.
          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists — uploading assets and refreshing notes."
            gh release upload "${tag}" --repo "${repo}" --clobber dist/*
            gh release edit   "${tag}" --repo "${repo}" --notes "${notes}"
          else
            gh release create "${tag}" --repo "${repo}" \
              --title "phantom ${tag}" \
              --notes "${notes}" \
              dist/*
          fi
